[project]
name = "equityiq-retrieval"
version = "0.1.0"
description = "Hybrid retrieval (pgvector + FTS + RRF) and cross-encoder reranking"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "asyncpg>=0.30",
    "tenacity>=9.0",
    "equityiq-llm",
    "equityiq-observability",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/equityiq_retrieval"]
