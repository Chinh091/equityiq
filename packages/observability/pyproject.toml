[project]
name = "equityiq-observability"
version = "0.1.0"
description = "Langfuse + structured logging setup"
requires-python = ">=3.12"
dependencies = [
    "langfuse>=2.50",
    "structlog>=24.4",
    "pydantic-settings>=2.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/equityiq_observability"]
