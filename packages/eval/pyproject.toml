[project]
name = "equityiq-eval"
version = "0.1.0"
description = "Golden-set evaluation harness with LLM-as-judge and CI regression gate"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "typer>=0.12",
    "rich>=13.9",
    "equityiq-llm",
    "equityiq-retrieval",
    "equityiq-observability",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/equityiq_eval"]
