[project]
name = "equityiq-llm"
version = "0.1.0"
description = "LLM client (OpenRouter), model router, structured outputs"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "tenacity>=9.0",
    "fastembed>=0.4",
    "equityiq-observability",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/equityiq_llm"]
