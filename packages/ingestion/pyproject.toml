[project]
name = "equityiq-ingestion"
version = "0.1.0"
description = "SEC EDGAR client, filing parsers, chunker, ingestion pipeline"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "asyncpg>=0.30",
    "tenacity>=9.0",
    "selectolax>=0.3.21",
    "tiktoken>=0.8",
    "equityiq-llm",
    "equityiq-observability",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/equityiq_ingestion"]
