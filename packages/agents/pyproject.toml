[project]
name = "equityiq-agents"
version = "0.1.0"
description = "Multi-agent equity research orchestration: planner, retriever, analyst, critic"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "equityiq-llm",
    "equityiq-retrieval",
    "equityiq-observability",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/equityiq_agents"]
